<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Responsive Layout</title>
  
</head>

<body>

  <div class="container">

    <header class="header">
      <h1>My Website</h1>
    </header>

    <aside class="sidebar">
      <h2>Sidebar</h2>
      <ul>
        <li>Home</li>
        <li>About</li>
        <li>Services</li>
        <li>Contact</li>
      </ul>
    </aside>

    <main class="main">
      <h2>Main Content</h2>
      <p>
        This is the main content area. Resize the screen to see how the layout changes.
      </p>
    </main>

    <footer class="footer">
      <p>© pullam Sandeep own Website</p>
      © pullam.sandeep@gmail.com</p>
    </footer>

  </div>
<style>
  body {
  margin: 0;
  font-family: Arial, sans-serif;
}


.container {
  display: grid;
  grid-template-columns: 250px 1fr;
  grid-template-rows: auto 1fr auto;
  grid-template-areas:
    "header header"
    "sidebar main"
    "footer footer";
  height: 100vh;
}


.header {
  grid-area: header;
  background: #333;
  color: white;
  padding: 15px;
  text-align: center;
}

.sidebar {
  grid-area: sidebar;
  background: #f4f4f4;
  padding: 15px;
}

.main {
  grid-area: main;
  padding: 15px;
}

.footer {
  grid-area: footer;
  background: #333;
  color: white;
  text-align: center;
  padding: 10px;
}


@media (max-width: 768px) {
  .container {
    grid-template-columns: 1fr;
    grid-template-areas:
      "header"
      "main"
      "sidebar"
      "footer";
  }
}
</style>
</body>
</html>
